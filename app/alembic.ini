# ==============================================================
# alembic.ini
#
# CONCEPT — Alembic configuration:
# Alembic reads this file to know how to connect to the database
# and where to find migration scripts.
#
# We override sqlalchemy.url in alembic/env.py using our
# settings object — so we do not hardcode credentials here.
# ==============================================================

[alembic]
# Path to the migration scripts folder
script_location = alembic

# Format for auto-generated migration file names:
# e.g. 2024_01_15_1234-create_users_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration file names
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S